name: Web CI

# Builds, unit-tests, and end-to-end-tests the Vue web app on every pull request and on pushes to master.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # the unit polarity tests read the real scan fixtures under web/e2e/fixtures
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # the real scan fixtures under web/e2e/fixtures are stored in Git LFS
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
