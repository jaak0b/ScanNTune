name: Web CI

# Builds, unit-tests, and end-to-end-tests the Vue web app on every pull request and on pushes to master.
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false # the unit polarity tests read the real scan fixtures under web/e2e/fixtures; the objects are restored from the cache below instead of a fresh LFS download
      - name: Build the LFS object cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
        working-directory: ${{ github.workspace }}
      - name: Restore the LFS object cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-${{ runner.os }}-
      - name: Fetch the LFS objects
        run: git lfs pull
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false # the real scan fixtures under web/e2e/fixtures are stored in Git LFS; the objects are restored from the cache below instead of a fresh LFS download
      - name: Build the LFS object cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
        working-directory: ${{ github.workspace }}
      - name: Restore the LFS object cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-${{ runner.os }}-
      - name: Fetch the LFS objects
        run: git lfs pull
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
