name: Mutation Testing

# Runs the full-scope Stryker mutation run over the core measurement engine. Manual trigger
# only: a full run is far too slow for pull requests or pushes, and local machines must never
# run it either (locally, `npm run mutation` mutates only the files changed against master).
on:
  workflow_dispatch:

defaults:
  run:
    working-directory: web

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false # the mutation suite reads the synthetic scan fixtures under web/e2e/fixtures; the objects are restored from the cache below instead of a fresh LFS download
      - name: Build the LFS object cache key
        run: git lfs ls-files -l | cut -d' ' -f1 | sort > .lfs-assets-id
        working-directory: ${{ github.workspace }}
      - name: Restore the LFS object cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ runner.os }}-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: lfs-${{ runner.os }}-
      - name: Fetch the LFS objects
        run: git lfs pull
        working-directory: ${{ github.workspace }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run mutation:full
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: web/reports/mutation
